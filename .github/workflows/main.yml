name: 'Update schedule'

on:
  schedule:
    - cron: '0 22,10 * * *'
  workflow_dispatch:
    branches:
      - master
      - dev
      - gd

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Set branch name
        id: vars
        run: |
          if [[ "${{ github.repository_owner }}" == "iversong" ]]; then
            echo "BRANCH_NAME=master" >> $GITHUB_ENV
          else
            echo "BRANCH_NAME=gd" >> $GITHUB_ENV
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.BRANCH_NAME }}
          # 关键：配置 token，让 checkout 拉取的仓库有后续推送权限
          token: ${{ secrets.GH_TOKEN }}

      - name: Run with setup-python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          update-environment: true
          cache: 'pipenv'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install pipenv
        run: pip3 install --user pipenv

      - name: Install dependecies
        run: pipenv --python 3.13 && pipenv install --deploy

      - name: Update
        run: pipenv run dev

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 检查是否有变更
          git add .
          git status
          git diff --quiet && git diff --staged --quiet || (
              git commit -m "Github Action Auto Updated"
              # 关键：使用带 token 的 URL，推送到当前分支，而不是硬编码 master
              git remote set-url origin https://${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git
              git push origin ${{ env.BRANCH_NAME }}
          )

